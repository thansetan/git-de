name: Update Demo File

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Get latest release tag
        id: get_latest_release
        run: |
          echo "RELEASE_TAG=$(gh release view --json tagName -q .tagName)" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install git-de from release
        run: |
          gh release download ${{ env.RELEASE_TAG }} \
            -p 'git-de_*_linux_x86_64.tar.gz' \
            -R ${{ github.repository }}
          tar xzf git-de_*_linux_x86_64.tar.gz
          sudo mv git-de /usr/local/bin/git-de
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install vhs and dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest
      - name: Generate demo GIF
        run: vhs demo/demo.tape
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(demo): update demo GIF for ${{ env.RELEASE_TAG }}"
          branch: main
          file_pattern: "demo/demo.gif"
